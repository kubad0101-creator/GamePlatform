<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spór o Bór 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
    <div id="status-bar">
        <div id="inviteBox">Wyślij link: <input type="text" id="inviteLink" readonly></div>
        <div id="gameInfo" style="display:none;">
            Role: <strong id="myRole"></strong> | Tura: <strong id="turnInfo"></strong> | Karty w talii: <span id="deckCount"></span>
        </div>
        <div id="cauldronInfo"></div>
    </div>

    <div class="board-container">
        <!-- Panel przeciwnika -->
        <div class="player-area opponent-area" id="opponent-area"></div>
        
        <!-- Rzeka i Tama -->
        <div class="river">
            <div class="dam-container" id="dam-tiles"></div>
        </div>
        
        <!-- Mój Panel (tu będą lądować moje zagrane karty) -->
        <div class="player-area my-area" id="my-area"></div>
    </div>
    
    <!-- Moja ręka -->
    <div class="my-hand" id="my-hand"></div>

    <script src="client.js"></script>
</body>
</html>
