<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spór o Bór 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
    <div id="status-bar">
        Czekam na przeciwnika... Wyślij znajomemu ten link: 
        <input type="text" id="inviteLink" readonly>
        <br><strong id="myRole" style="color: #f1c40f;"></strong>
    </div>

    <div class="board-container">
        <div class="player-area opponent-area" id="opponent-cards">Przeciwnik</div>
        <div class="river">
            <div class="dam-container" id="dam-tiles"></div>
        </div>
        <div class="player-area my-area" id="my-cards">Moje karty (Stół)</div>
    </div>
    
    <div class="my-hand" id="my-hand">Moja Ręka</div>

    <script src="client.js"></script>
</body>
</html>
