<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spór o Bór 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
    <div id="status-bar">
        <div id="inviteBox">Oczekuję... Link: <input type="text" id="inviteLink" readonly></div>
        <div id="gameInfo" style="display:none;">
            Rola: <strong id="myRole"></strong> | <span id="turnInfo"></span> | Smoła: <span id="cauldronInfo">0</span>
        </div>
    </div>

    <!-- Główny układ -->
    <div class="main-layout">
        <!-- Lewy las: Pieniek odrzuconych -->
        <div class="forest-side left-forest">
            <div class="stump discard-stump" onclick="openDiscardModal()">
                <span>Odrzucone</span>
                <div id="discardCount">0</div>
            </div>
        </div>

        <!-- Środkowa plansza (Stół) -->
        <div class="board-container">
            <div id="vertical-board">
                <!-- Rzędy z kafelkami generowane przez JS -->
            </div>
        </div>

        <!-- Prawy las: Pieniek dobierania -->
        <div class="forest-side right-forest">
            <div class="stump deck-stump">
                <span>Talia</span>
                <div id="deckCount">0</div>
            </div>
        </div>
    </div>
    
    <!-- Karty w ręku, na stałe na dole ekranu -->
    <div class="my-hand" id="my-hand"></div>

    <!-- Modal do podglądu kart odrzuconych -->
    <div id="discardModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDiscardModal()">&times;</span>
            <h2>Karty Odrzucone</h2>
            <div id="discardList" class="discard-list"></div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
