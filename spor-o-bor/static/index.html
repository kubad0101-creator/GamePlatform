<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platforma Gier - Spór o Bór 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="lobby-body">
    <div class="container">
        <h1>Graj ze Znajomymi</h1>
        <div class="game-card">
            <h2>Spór o Bór 2: Na tamę marsz</h2>
            <p>Rozlosujcie kto broni tamy, a kto atakuje!</p>
            <button id="createGameBtn">Utwórz pokój do gry</button>
        </div>
    </div>
    
    <script>
        document.getElementById('createGameBtn').addEventListener('click', async () => {
            const response = await fetch('/create-room');
            const data = await response.json();
            window.location.href = `/static/game.html?room=${data.room_id}`;
        });
    </script>
</body>
</html>
